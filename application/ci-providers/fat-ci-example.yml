# Fat CI anti-pattern — kept here for direct comparison with the thin
# variants in this directory. Do NOT copy this for new pipelines.
#
# Hallmarks of Fat CI (see Phần I §1.1 of the research document):
#   - all logic written inline in YAML
#   - cannot be reproduced on a developer laptop
#   - rewriting it for another CI provider means starting from scratch
#   - YAML conditionals are doing the job a programming language should
name: fat-ci-deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r application/src/requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          cd application
          PYTHONPATH=src python -m pytest tests/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to ECR
        run: aws ecr get-login-password | docker login --username AWS --password-stdin "$REGISTRY"
        env:
          REGISTRY: 123456789012.dkr.ecr.ap-southeast-1.amazonaws.com

      - name: Determine environment
        id: env
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "env=production" >> $GITHUB_OUTPUT
            echo "bucket=prod-artifacts" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            echo "env=staging" >> $GITHUB_OUTPUT
            echo "bucket=staging-artifacts" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "bucket=dev-artifacts" >> $GITHUB_OUTPUT
          fi

      - name: Build image
        run: |
          IMAGE="$REGISTRY/sample-app:${GITHUB_SHA::7}"
          docker build \
            --build-arg "APP_VERSION=${GITHUB_SHA::7}" \
            --build-arg "BUILD_ENV=${{ steps.env.outputs.env }}" \
            -t "$IMAGE" \
            application/
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
        env:
          REGISTRY: 123456789012.dkr.ecr.ap-southeast-1.amazonaws.com

      - name: Push image
        run: docker push "$IMAGE"

      - name: Deploy
        run: |
          aws eks update-kubeconfig --name cluster-${{ steps.env.outputs.env }}
          kubectl set image deployment/sample-app sample-app="$IMAGE" -n ${{ steps.env.outputs.env }}
          kubectl rollout status deployment/sample-app -n ${{ steps.env.outputs.env }} --timeout=5m

      - name: Invalidate CDN
        if: steps.env.outputs.env == 'production'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DIST_ID }} \
            --paths "/*"

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Deploy ${{ steps.env.outputs.env }}: ${STATUS}\"}" \
            ${{ secrets.SLACK_WEBHOOK }}
