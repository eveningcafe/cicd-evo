# Thin CI on GitLab. Same scripts, different surface syntax.
# Compare against github-actions.yml — the "interesting" part of both files
# is the trigger config, not the deploy logic. That is the point.

stages: [test, build, deploy]

variables:
  IMAGE_REGISTRY: $CI_REGISTRY/$CI_PROJECT_PATH

test:
  stage: test
  image: python:3.12-slim
  script:
    - ./application/scripts/test.sh

build:
  stage: build
  image: docker:24
  services: [docker:24-dind]
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - ./application/scripts/build.sh
    - docker push "$(cat application/.build/image)"

deploy-dev:
  stage: deploy
  only: [main]
  script:
    - ./application/scripts/deploy.sh dev
