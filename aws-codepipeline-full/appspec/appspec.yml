# CodeDeploy AppSpec for EC2/On-Premises.
# Lifecycle order: ApplicationStop -> BeforeInstall -> (CodeDeploy copies files) ->
#                  AfterInstall -> ApplicationStart -> ValidateService
version: 0.0
os: linux

# Copy stage: CodeDeploy unpacks the artifact and places these paths.
files:
  - source: app
    destination: /opt/sample-app/app
  - source: sample-app.service
    destination: /etc/systemd/system

permissions:
  - object: /opt/sample-app
    pattern: "**"
    owner: ec2-user
    group: ec2-user
    mode: "755"
  - object: /etc/systemd/system/sample-app.service
    mode: "644"

hooks:
  ApplicationStop:
    - location: scripts/application_stop.sh
      timeout: 60
      runas: root

  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 60
      runas: root

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 180
      runas: root

  ApplicationStart:
    - location: scripts/application_start.sh
      timeout: 60
      runas: root

  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 60
      runas: root
