# Minimal CodeDeploy AppSpec — install + validate. Stop/Start are folded
# into install.sh for brevity.
version: 0.0
os: linux

files:
  - source: app
    destination: /opt/sample-app/app

permissions:
  - object: /opt/sample-app
    pattern: "**"
    owner: ec2-user
    group: ec2-user
    mode: "755"

hooks:
  AfterInstall:
    - location: scripts/install.sh
      timeout: 180
      runas: root

  ValidateService:
    - location: scripts/validate.sh
      timeout: 60
      runas: root
