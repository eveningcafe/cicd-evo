apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sample-app-prod

resources:
  - ../../base

patches:
  - path: replicas-patch.yaml
    target:
      kind: Deployment
      name: sample-app
  - path: env-patch.yaml
    target:
      kind: Deployment
      name: sample-app
  - path: resources-patch.yaml
    target:
      kind: Deployment
      name: sample-app

images:
  - name: ghcr.io/example-org/sample-app
    newTag: placeholder
