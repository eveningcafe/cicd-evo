# Illustrative output of `kubeseal`. The `encryptedData` values are
# truncated placeholders — a real SealedSecret has ~340-character ciphertext
# per field. Safe to commit; only the in-cluster controller can decrypt.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: sample-app-secrets
  namespace: sample-app-dev
spec:
  encryptedData:
    DATABASE_URL: AgB7QmF...truncated-ciphertext...zXyZ=
    API_KEY: AgCx9Lm...truncated-ciphertext...QrSt=
  template:
    metadata:
      name: sample-app-secrets
      namespace: sample-app-dev
    type: Opaque
